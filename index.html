<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">


<style>

/* =====================
 RESET
===================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Prompt',sans-serif;
}


/* =====================
 BACKGROUND
===================== */

body{

    min-height:100vh;

    overflow:hidden;

    background:#eadcff;

}


/* แสงพื้นหลังแบบนุ่ม */

body::before{

    content:"";

    position:absolute;

    width:350px;

    height:350px;

    background:#f9a8d4;

    border-radius:50%;

    filter:blur(120px);

    top:-100px;

    left:-100px;

}


body::after{

    content:"";

    position:absolute;

    width:350px;

    height:350px;

    background:#c4b5fd;

    border-radius:50%;

    filter:blur(120px);

    bottom:-100px;

    right:-100px;

}



/* =====================
 NAVBAR
===================== */


nav{

    position:fixed;

    top:20px;

    left:50%;

    transform:translateX(-50%);

    width:90%;

    padding:18px;


    display:flex;

    justify-content:center;

    gap:25px;


    background:rgba(255,255,255,.45);

    backdrop-filter:blur(15px);


    border-radius:40px;


    box-shadow:

    0 10px 30px rgba(0,0,0,.1);


    z-index:10;

}



nav a{

    color:#7c3aed;

    text-decoration:none;

    font-weight:600;

    transition:.3s;

}


nav a:hover{

    color:#ec4899;

}



/* =====================
 ดาวตก
===================== */


.star{

    position:absolute;

    top:-50px;

    color:#ffffff;

    opacity:.45;

    animation:fall linear infinite;

    z-index:1;

}



@keyframes fall{


from{

    transform:

    translateY(-50px)
    rotate(0deg);

}


to{

    transform:

    translateY(110vh)
    rotate(360deg);

}


}



/* =====================
 HERO
===================== */


.hero{

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    position:relative;

    z-index:2;

}



/* =====================
 PROFILE CARD
===================== */


.profile-box{


    width:500px;

    padding:45px;


    text-align:center;


    background:

    rgba(255,255,255,.45);


    backdrop-filter:blur(20px);


    border-radius:35px;


    box-shadow:

    0 20px 50px rgba(0,0,0,.15);


    animation:show 1s;

}



@keyframes show{


from{

opacity:0;

transform:translateY(50px);

}


to{

opacity:1;

transform:translateY(0);

}


}



/* =====================
 PROFILE IMAGE
===================== */


.profile{

    width:190px;

    height:190px;

    object-fit:cover;

    border-radius:50%;


    border:6px solid white;


    box-shadow:

    0 0 25px #f9a8d4;


    animation:float 3s infinite;

}



@keyframes float{


50%{

transform:translateY(-12px);

}


}



/* =====================
 TEXT
===================== */


h1{

    margin-top:25px;

    font-size:60px;

    color:#7c3aed;


}



h2{

    margin-top:10px;

    color:#ec4899;

    font-size:30px;

}



p{

    margin:20px;

    color:#555;

    font-size:18px;

    line-height:1.8;

}



/* =====================
 BUTTON
===================== */


button{


    padding:15px 45px;


    border:none;


    border-radius:50px;


    background:#ec4899;


    color:white;


    font-size:18px;


    font-weight:bold;


    cursor:pointer;


    transition:.3s;


}



button:hover{


    background:#8b5cf6;


    transform:translateY(-5px);


}



/* =====================
 MOBILE
===================== */


@media(max-width:700px){


nav{

gap:12px;

flex-wrap:wrap;

}


nav a{

font-size:13px;

}


.profile-box{

width:90%;

padding:30px;

}


.profile{

width:150px;

height:150px;

}


h1{

font-size:40px;

}


h2{

font-size:22px;

}


}


</style>


</head>


<body>


<!-- เมนู -->

<nav>

<a href="#">หน้าปก</a>

<a href="profile.html">ประวัติส่วนตัว</a>

<a href="education.html">การศึกษา</a>

<a href="grades.html">ผลการเรียน</a>

<a href="certificates.html">เกียรติบัตร</a>

<a href="activities.html">กิจกรรม</a>

</nav>



<!-- ดาวตก -->



<section class="hero">


<div class="profile-box">


<img src="images/profile.jpg" class="profile">


<h1>
PORTFOLIO
</h1>


<h2>
ชื่อ - นามสกุล
</h2>


<p>

นักเรียนชั้นมัธยมศึกษาปีที่ 6

<br>

โรงเรียน...........................

<br>

แผนการเรียน.....................

</p>


<button onclick="location.href='profile.html'">

เข้าสู่ Portfolio

</button>


</div>


</section>




<script>


// สร้างดาวตกแบบจาง ๆ

for(let i=0;i<35;i++){


let star=document.createElement("div");


star.className="star";


star.innerHTML="✦";


star.style.left=Math.random()*100+"vw";


star.style.fontSize=
(10+Math.random()*15)+"px";


star.style.animationDuration=
(8+Math.random()*8)+"s";


star.style.animationDelay=
Math.random()*8+"s";


document.body.appendChild(star);


}


</script>


</body>

</html>
